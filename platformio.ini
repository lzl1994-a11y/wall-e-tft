[platformio]
; Keep generated build files on an ASCII-only path. The Windows xtensa linker
; can fail to create firmware.map when the project path contains Chinese text.
build_dir = F:/well-e-bot/pio-build/wall-e-tft

[env:esp32]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
upload_speed = 921600
lib_deps =
  moononournation/GFX Library for Arduino@1.5.6
  bitbank2/AnimatedGIF
build_flags =
  -DCORE_DEBUG_LEVEL=1
  
